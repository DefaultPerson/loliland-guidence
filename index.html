<div id="app">
  <header class="topbar">
    <div class="bar-inner">
      <div class="brand">

        <div class="brand-txt">
          <div class="brand-name">TechnoMagic <span>RPG</span></div>
          <div class="brand-sub" id="pack-ver">Чеклист · LoliLand</div>
        </div>

        <button data-tab="map" class="active" type="button"><svg class="ico"><use href="#i-map"/></svg><span>Карта</span></button>
